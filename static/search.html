<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>搜索 | 白起文案汇编</title>
    <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
    <script src="/pagefind/pagefind-ui.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f5f5;
            font-size: 16px; /* 基础字体，手机下不会太小 */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #333;
        }
        .back-link {
            display: inline-block;
            background: #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: #ccc;
        }
        /* 让 Pagefind 的输入框和结果在手机上更友好 */
        .pagefind-ui__search-input {
            font-size: 16px !important; /* 防止 iOS 缩放时自动放大 */
            padding: 12px !important;
        }
        .pagefind-ui__result {
            margin-bottom: 1rem;
            padding: 0.5rem 0;
        }
        .pagefind-ui__result-title {
            font-size: 1.1rem !important;
        }
        .pagefind-ui__result-excerpt {
            font-size: 0.85rem !important;
            color: #555;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }
        @media (max-width: 600px) {
            body {
                padding: 0.8rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .back-link {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }
        }
    /* 修复放大镜图标与文字重叠 */
.pagefind-ui__search-input {
    padding-left: 2.5rem !important;  /* 为图标留出空间 */
    background-position: left center !important;
    background-repeat: no-repeat !important;
    background-size: 1.2rem !important;
}
.pagefind-ui__form::before {
    left: 0.8rem !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
}
/* 如果图标是背景图，调整位置 */
.pagefind-ui__search-clear {
    right: 0.5rem !important;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>搜索</h1>
        <a href="/" class="back-link">← 返回首页</a>
    </div>
    <div id="search"></div>
    <footer>Powered by Pagefind</footer>
</div>
<script>
    window.addEventListener('DOMContentLoaded', function() {
        new PagefindUI({ 
            element: "#search",
            showImages: false,
            showSubResults: false
        });
        // 可选：从 URL 参数读取查询词并自动搜索
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        if (q) {
            setTimeout(() => {
                const input = document.querySelector('.pagefind-ui__search-input');
                if (input) {
                    input.value = q;
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                }
            }, 200);
        }
    });
</script>
</body>
</html>
