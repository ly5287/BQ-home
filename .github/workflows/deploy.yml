name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # 👇 关键：hugo构建不加-d，默认生成到public，避免嵌套
      - name: Build with Hugo
        run: |
          hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      # 👇
      - name: Run Pagefind
        run: pagefind --site public --output-path public/pagefind

      # 👇
      - name: Post-process search page
        run: |
          python3 -c "
      import re
      with open('public/search/index.html', 'r', encoding='utf-8') as f:
          content = f.read()
      # 匹配 <main id="R-body-inner"...> 和 </main> 之间的内容
      pattern = r'(<main id="R-body-inner"[^>]*>)(.*?)(</main>)'
      replacement = r'''\1
      <div class="post-content">
          <div id="pagefind-search"></div>
          <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
          <script src="/pagefind/pagefind-ui.js"></script>
          <script>
              window.addEventListener("DOMContentLoaded", function() {
                  if (typeof PagefindUI === "undefined") {
                      console.error("PagefindUI not loaded");
                      document.getElementById("pagefind-search").innerHTML = "<p style=\"color:red;\">搜索功能加载失败，请刷新页面重试。</p>";
                      return;
                  }
                  new PagefindUI({ element: "#pagefind-search", showSubResults: false, showImages: false });
                  const urlParams = new URLSearchParams(window.location.search);
                  const q = urlParams.get("q");
                  if (q) {
                      setTimeout(function() {
                          const input = document.querySelector(".pagefind-ui__search-input");
                          if (input) {
                              input.value = q;
                              input.dispatchEvent(new Event("input", { bubbles: true }));
                          }
                      }, 200);
                  }
              });
          </script>
      </div>
      \3'''
      new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
      with open('public/search/index.html', 'w', encoding='utf-8') as f:
          f.write(new_content)
      print("Search page post-processed successfully.")
      "
      - name: Verify search page
        run: |
          echo "=== First 30 lines of public/search/index.html ==="
          head -30 public/search/index.html
          echo "=== Check for pagefind-ui ==="
          grep -q "pagefind-ui" public/search/index.html && echo "Found pagefind-ui" || echo "NOT found"

      # 👇 关键：只上传public根目录，绝对不要加/public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4